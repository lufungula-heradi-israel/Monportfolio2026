</header><main class="container">
    <section class="hero-section">
        <h2>Contactez-moi</h2>
        <p>Une question ou un projet ? N'hésitez pas à m'envoyer un message !</p>
    </section>

    <div class="contact-container">
        <div class="contact-content">
            
            <div class="contact-info">
                <h3>Mes coordonnées</h3>
                <p><i class="fa-solid fa-envelope"></i> mario@exemple.com</p>
                <p><i class="fa-solid fa-location-dot"></i> Lubumbashi, RDC</p>
                
                <div class="social-apps">
                    <a href="#" class="app-link whatsapp">
                        <i class="fa-brands fa-whatsapp"></i> WhatsApp
                    </a>
                    <a href="#" class="app-link telegram">
                        <i class="fa-brands fa-telegram"></i> Telegram
                    </a>
                </div>
            </div>

            <form class="contact-form">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" placeholder="Votre nom...">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="Votre message ici..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Envoyer le message</button>
            </form>

        </div>
    </div>
